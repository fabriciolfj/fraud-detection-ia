plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.google.protobuf' version '0.9.5'
}

group = 'com.github.fabriciolfj'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

ext {
	set('springGrpcVersion', "1.0.3")
}


dependencies {
	implementation 'io.grpc:grpc-services'
	implementation 'org.springframework.grpc:spring-grpc-server-spring-boot-starter'
	implementation 'dev.langchain4j:langchain4j-spring-boot4-starter:1.14.0-beta24'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'ai.djl:api:0.33.0'
	implementation 'dev.langchain4j:langchain4j-anthropic:1.13.1'
	implementation 'dev.langchain4j:langchain4j:1.13.1'
	implementation 'dev.langchain4j:langchain4j-core:1.13.1'
	implementation 'ai.djl.onnxruntime:onnxruntime-engine:0.33.0'
	implementation 'dev.langchain4j:langchain4j-anthropic-spring-boot4-starter:1.14.0-beta24'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.grpc:spring-grpc-dependencies:${springGrpcVersion}"
	}
}


tasks.named('test') {
	useJUnitPlatform()
}

protobuf {
	protoc {
		artifact = 'com.google.protobuf:protoc'
	}
	plugins {
		grpc {
			artifact = 'io.grpc:protoc-gen-grpc-java'
		}
	}
	generateProtoTasks {
		all()*.plugins {
			grpc {
				option '@generated=omit'
			}
		}
	}
}
